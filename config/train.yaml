experiment:
  name: x-community-cats
  artifact_root: artifacts/models

dataset:
  data_yaml: lastest/data.yaml

model:
  base: artifacts/models/lastest/checkpoints/best.pt
  imgsz: 320

train:
  epochs: 36
  batch: 64
  device: cpu
  amp: true
  workers: 8
  patience: 20

export:
  enabled: true
  targets: onnx,coreml,tensorrt,rknn

gating:
  required_classes:
    - cat
    - dog
    - person
    - opossum
    - raccoon
    - skunk
  recall_thresholds:
    cat: 0.65
    dog: 0.60
    person: 0.6
    raccoon: 0.60
    opossum: 0.60
    skunk: 0.60
