experiment:
  name: active-learning
  artifact_root: artifacts/models

dataset:
  data_yaml: imagebyclass-2026-02-28/data.yaml

model:
  base: yolov8s.pt
  imgsz: 320

train:
  epochs: 20
  batch: 32
  device: cpu
  amp: true
  workers: 16
  patience: 20

export:
  enabled: true
  targets: onnx,coreml,tensorrt,rknn

gating:
  required_classes:
    - cat
    - dog
    - person
    - opossum
    - raccoon
    - skunk
  recall_thresholds:
    cat: 0.65
    dog: 0.60
    person: 0.6
    raccoon: 0.60
    opossum: 0.60
    skunk: 0.60
